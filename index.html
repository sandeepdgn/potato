<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato Disease AI</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        #preview {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-top: 20px;
            display: none; /* Hidden until image is uploaded */
        }

        .btn-predict {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .btn-predict:hover { background-color: #2980b9; }

        /* Results Styling */
        .bar-container {
            width: 100%;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .bar {
            height: 24px;
            color: white;
            font-size: 12px;
            line-height: 24px;
            padding-right: 10px;
            text-align: right;
            transition: width 0.5s ease-in-out;
        }

        /* Dynamic Classes */
        .Early-Blight { background-color: var(--warning); }
        .Late-Blight { background-color: var(--danger); }
        .Healthy { background-color: var(--success); }

        /* Simple Loader */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h1>Potato Health Check</h1>
        <p>Upload a leaf image to detect diseases</p>
        
        <input type="file" id="fileInput" accept="image/*">
        <br><br>
        <button class="btn-predict" onclick="uploadImage()">Analyze Leaf</button>

        <div id="loader" class="loader"></div>
        <img id="preview" src="" alt="Leaf Preview">
        <div id="results" style="margin-top: 20px;"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { 
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    resultsDiv.innerHTML = ""; // Clear old results on new select
                }
                reader.readAsDataURL(file);
            }
        });

        async function uploadImage() {
            const file = fileInput.files[0];
            if (!file) return alert("Please select an image first!");

            const formData = new FormData();
            formData.append("file", file);

            // UI Feedback
            resultsDiv.innerHTML = "";
            loader.style.display = "block";

            try {
                const response = await fetch("http://127.0.0.1:8000/predict", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Server error occurred.");
                
                const data = await response.json();
                loader.style.display = "none";

                if (data.error) {
                    resultsDiv.innerHTML = `<p style="color:red">${data.error}</p>`;
                    return;
                }

                data.predictions.forEach(pred => {
                    // Create a class-friendly name (e.g., "Early Blight" -> "Early-Blight")
                    const safeClassName = pred.class.replace(/\s+/g, '-');
                    const confidencePercent = (pred.confidence * 100).toFixed(1);

                    resultsDiv.innerHTML += `
                        <div style="text-align:left; font-weight:bold; margin-bottom:5px;">
                            ${pred.class} (${confidencePercent}%)
                        </div>
                        <div class="bar-container">
                            <div class="bar ${safeClassName}" style="width: ${confidencePercent}%">
                                ${confidencePercent}%
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                loader.style.display = "none";
                resultsDiv.innerHTML = `<p style="color:red">Error: ${err.message}. Ensure your backend is running.</p>`;
            }
        }
    </script>
</body>
</html>
